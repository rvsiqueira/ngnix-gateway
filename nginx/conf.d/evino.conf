# Evino (evino.agentclub.io)

server {
    listen 443 ssl http2;
    server_name evino.agentclub.io;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:50m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000" always;

    client_max_body_size 30M;

    # Static audio uploads
    location /uploads/ {
        set $evino_api "http://evino-api:8000";
        proxy_pass $evino_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket: chat streaming (Cloudflare-compatible)
    location /api/chat/ws {
        set $evino_api "http://evino-api:8000";
        proxy_pass $evino_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    # SSE: chat streaming
    location /api/chat {
        set $evino_api "http://evino-api:8000";
        proxy_pass $evino_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        chunked_transfer_encoding on;
        add_header X-Accel-Buffering no;
        add_header Alt-Svc 'none' always;
    }

    # SSE: audio respond
    location /api/audio/respond {
        set $evino_api "http://evino-api:8000";
        proxy_pass $evino_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120;
        proxy_send_timeout 120;
        add_header X-Accel-Buffering no;
        add_header Alt-Svc 'none' always;
    }

    # Health and docs → FastAPI backend
    location /health {
        set $evino_api "http://evino-api:8000";
        proxy_pass $evino_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # All other API routes → FastAPI backend
    location /api/ {
        set $evino_api "http://evino-api:8000";
        proxy_pass $evino_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60;
    }

    # Next.js frontend
    location / {
        set $evino_web "http://evino-web:3000";
        proxy_pass $evino_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60;
    }
}

server {
    listen 80;
    server_name evino.agentclub.io;
    return 301 https://$host$request_uri;
}
