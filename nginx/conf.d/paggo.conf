server {
    listen 443 ssl http2;
    server_name paggo-ai.agentclub.io;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:50m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000" always;

    # ── SSE: journey events (proxied through Next.js SSE route) ───
    location ~ ^/api/runs/[^/]+/events {
        limit_req zone=api burst=10 nodelay;

        set $paggo_web "http://paggo-ai-web:3001";
        proxy_pass $paggo_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        chunked_transfer_encoding on;
    }

    # ── Upload de arquivos ─────────────────────────────────────────
    location /upload {
        limit_req zone=api burst=5 nodelay;

        set $paggo_api "http://paggo-api:8001";
        proxy_pass $paggo_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        client_max_body_size 50M;
        proxy_read_timeout 120;
        proxy_send_timeout 120;
    }

    # ── Assistant streaming (Forge) ────────────────────────────────
    location /assistant/chat/stream {
        set $paggo_api "http://paggo-api:8001";
        proxy_pass $paggo_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600;
        chunked_transfer_encoding on;
    }

    # ── CS Digest generation (long-running LLM calls — up to 3min) ──────────────
    location ~ ^/api/cs/digest/generate {
        set $paggo_web "http://paggo-ai-web:3001";
        proxy_pass $paggo_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }

    # ── All /api/ routes go through Next.js (which adds JWT and calls FastAPI) ──
    location /api/ {
        set $paggo_web "http://paggo-ai-web:3001";
        proxy_pass $paggo_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 120;
    }

    # ── Next.js Studio (catch-all) ────────────────────────────────
    location / {
        limit_req zone=web burst=50 nodelay;

        set $paggo_web "http://paggo-ai-web:3001";
        proxy_pass $paggo_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_read_timeout 60;
    }
}
