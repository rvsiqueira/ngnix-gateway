server {
    listen 443 ssl http2;
    server_name paggo.agentclub.io;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:50m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000" always;

    # Rate limiting (inherits zones from nginx.conf)
    limit_req_zone $http_cf_connecting_ip zone=paggo_api:10m rate=20r/s;
    limit_req_zone $http_cf_connecting_ip zone=paggo_web:10m rate=30r/s;

    # ── Direct API access (bypassa Next.js proxy) ──────────────────
    # SSE streams (journey events) — sem buffering
    location ~ ^/api/runs/[^/]+/events {
        limit_req zone=paggo_api burst=10 nodelay;

        proxy_pass http://paggo-api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # SSE: sem buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        chunked_transfer_encoding on;
    }

    # Upload de arquivos (body maior)
    location /upload {
        limit_req zone=paggo_api burst=5 nodelay;

        proxy_pass http://paggo-api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        client_max_body_size 50M;
        proxy_read_timeout 120;
        proxy_send_timeout 120;
    }

    # Assistant streaming (Forge)
    location /assistant/chat/stream {
        proxy_pass http://paggo-api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600;
        chunked_transfer_encoding on;
    }

    # ── Next.js Studio (catch-all) ─────────────────────────────────
    location / {
        limit_req zone=paggo_web burst=50 nodelay;

        proxy_pass http://paggo-web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Next.js HMR (dev) — não usada em prod mas não quebra
        proxy_set_header Upgrade $http_upgrade;

        proxy_read_timeout 60;
    }
}
