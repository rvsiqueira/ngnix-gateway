# Evino (evino.pumpkinlabs.io)
# NOTE: requires /etc/nginx/ssl/pumpkin-fullchain.pem and pumpkin-privkey.pem

server {
    listen 443 ssl http2;
    server_name evino.pumpkinlabs.io;

    ssl_certificate     /etc/nginx/ssl/pumpkin-fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/pumpkin-privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:50m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000" always;

    client_max_body_size 30M;

    location /uploads/ {
        set $evino_api "http://evino-api:8000";
        proxy_pass $evino_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        set $evino_api "http://evino-api:8000";
        proxy_pass $evino_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/chat {
        set $evino_api "http://evino-api:8000";
        proxy_pass $evino_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
        chunked_transfer_encoding on;
    }

    location /api/audio/respond {
        set $evino_api "http://evino-api:8000";
        proxy_pass $evino_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120;
        proxy_send_timeout 120;
    }

    location /api/ {
        set $evino_api "http://evino-api:8000";
        proxy_pass $evino_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60;
    }

    location / {
        set $evino_web "http://evino-web:3000";
        proxy_pass $evino_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60;
    }
}

server {
    listen 80;
    server_name evino.pumpkinlabs.io;
    return 301 https://$host$request_uri;
}
