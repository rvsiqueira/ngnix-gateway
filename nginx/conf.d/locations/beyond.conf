# Beyond The Club - API
location /api/ {
    limit_req zone=api burst=20 nodelay;

    set $btc_api "http://btc-api:8000";
    proxy_pass $btc_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # WebSocket support
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400;
}

# Beyond The Club - WebSocket endpoint for monitor
location /api/v1/monitor/ws/ {
    set $btc_api "http://btc-api:8000";
    proxy_pass $btc_api;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;
}

# Beyond The Club - MCP Server (Voice Agent)
location /mcp/ {
    rewrite ^/mcp/(.*)$ /$1 break;

    set $btc_mcp "http://btc-mcp:8001";
    proxy_pass $btc_mcp;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    # SSE support (Server-Sent Events)
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 86400;
    proxy_send_timeout 86400;

    # For SSE streaming
    chunked_transfer_encoding on;
}

# Beyond The Club - Frontend (catch-all, must be last)
location / {
    limit_req zone=web burst=50 nodelay;

    set $btc_web "http://btc-web:3000";
    proxy_pass $btc_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
}
