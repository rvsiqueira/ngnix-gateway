location /linkedin/ {
    limit_req zone=api burst=20 nodelay;

    set $linkedin_api "http://linkedin-api:8000";
    rewrite ^/linkedin/(.*)$ /$1 break;

    proxy_pass $linkedin_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    client_max_body_size 10M;
    proxy_read_timeout 60;
    proxy_send_timeout 60;
}

location /linkedin/docs {
    set $linkedin_api "http://linkedin-api:8000";
    rewrite ^/linkedin/docs(.*)$ /docs$1 break;

    proxy_pass $linkedin_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /linkedin/openapi.json {
    set $linkedin_api "http://linkedin-api:8000";
    rewrite ^/linkedin/openapi.json$ /openapi.json break;

    proxy_pass $linkedin_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
